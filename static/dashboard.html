<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel | Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { zinc: { 850: '#1f1f22', 900: '#18181b', 950: '#09090b' } }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-300 font-sans antialiased h-screen flex overflow-hidden">
    <aside class="w-64 border-r border-zinc-800 bg-zinc-950 flex flex-col">
        <div class="p-6 border-b border-zinc-800">
            <h1 class="text-lg font-semibold text-white tracking-tight">SENTINEL</h1>
            <p class="text-xs text-zinc-500 mt-1">Integrity Guardian v1.0</p>
        </div>
        <div class="p-4 border-t border-zinc-800 mt-auto">
            <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-xs font-medium text-emerald-500">SYSTEM ACTIVE</span>
            </div>
        </div>
    </aside>
    <main class="flex-1 flex flex-col min-w-0 bg-zinc-950">
        <header class="h-16 border-b border-zinc-800 flex items-center justify-between px-8 bg-zinc-950/50 backdrop-blur-sm sticky top-0 z-10">
            <h2 class="text-sm font-medium text-white">Live Operations</h2>
            <button onclick="fetchLogs()" class="text-zinc-400 hover:text-white">Refresh</button>
        </header>
        <div class="px-8 py-8 grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-zinc-900/50 border border-zinc-800 rounded-lg p-5">
                <p class="text-xs font-medium text-zinc-500 uppercase">Audit Count</p>
                <p class="text-2xl font-semibold text-white mt-1" id="total-count">--</p>
            </div>
            <div class="bg-zinc-900/50 border border-zinc-800 rounded-lg p-5">
                <p class="text-xs font-medium text-zinc-500 uppercase">Drift Detected</p>
                <p class="text-2xl font-semibold text-rose-500 mt-1" id="fail-count">--</p>
            </div>
            <div class="bg-zinc-900/50 border border-zinc-800 rounded-lg p-5">
                <p class="text-xs font-medium text-zinc-500 uppercase">F1 Engine</p>
                <p class="text-2xl font-semibold text-emerald-500 mt-1">ONLINE</p>
            </div>
        </div>
        <div class="flex-1 overflow-auto px-8 pb-8">
            <div class="border border-zinc-800 rounded-lg overflow-hidden bg-zinc-900/30">
                <table class="w-full text-left text-sm">
                    <thead class="bg-zinc-900 text-zinc-500 border-b border-zinc-800 text-xs uppercase">
                        <tr>
                            <th class="px-6 py-4">Time</th>
                            <th class="px-6 py-4">Target</th>
                            <th class="px-6 py-4">Verdict</th>
                            <th class="px-6 py-4">Analysis</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-zinc-800/50" id="logs-body"></tbody>
                </table>
            </div>
        </div>
    </main>
    <script>
        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs');
                const logs = await response.json();
                const tbody = document.getElementById('logs-body');
                tbody.innerHTML = '';
                let fails = 0;
                logs.forEach(log => {
                    if (log.status === 'failed') fails++;
                    const date = new Date(log.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const badge = log.status === 'failed' ? 'text-rose-500 bg-rose-500/10' : 'text-emerald-500 bg-emerald-500/10';
                    tbody.innerHTML += `
                        <tr class="hover:bg-zinc-900/50">
                            <td class="px-6 py-4 text-zinc-500 font-mono text-xs">${date}</td>
                            <td class="px-6 py-4 text-zinc-300 font-medium">${log.file_name}</td>
                            <td class="px-6 py-4"><span class="px-2 py-0.5 rounded text-xs border border-transparent ${badge}">${log.violation.includes('DRIFT') ? 'DRIFT' : 'ALIGNED'}</span></td>
                            <td class="px-6 py-4 text-zinc-400 truncate max-w-md" title="${log.violation}">${log.violation}</td>
                        </tr>`;
                });
                document.getElementById('total-count').innerText = logs.length;
                document.getElementById('fail-count').innerText = fails;
            } catch (e) { console.error(e); }
        }
        fetchLogs();
        setInterval(fetchLogs, 5000);
    </script>
</body>
</html>
